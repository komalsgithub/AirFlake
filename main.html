<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>AirFlake | Productivity, Focus & Task Management Tool</title>

    <!-- SEO Meta Tags -->

      name="description"
      content="AirFlake is your all-in-one productivity tool for tracking tasks, staying focused, and managing your goals with a visual vault and AI assistant."

      name="keywords"

    <meta name="author" content="AirFlake Team" />
    <link rel="canonical" href="https://yourdomain.com/" />

      property="og:title"

    <meta property="og:url" content="https://yourdomain.com/" />

        <img

        />
        <!--  <span>AirFlake</span> -->
      </h1>

      <ul>
        <li>
           <div class="tooltip">
          <a onclick="loadPage('home.html')" aria-label="Home">

              class="icon"

        </li>
        <li>
          <div class="tooltip">

              class="icon"

          <span class="tooltip-text">Tasks</span>

        </li>
        <li>

          <a onclick="loadPage('focus.html')" aria-label="Focus">

          </div>
        </li>
        <li>
          <div class="tooltip">

          </a>
          <span class="tooltip-text">Organize</span>

        </li>
        <li>

    <main class="main-content">
      <iframe
